---
# yamllint disable rule:truthy
name: Publish Infrahub Sync Package

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: "The OS to run the job on"
        required: false
        default: "ubuntu-22.04"
        type: string
      version:
        type: string
        required: false
        description: The string to extract semver labels from.
        default: ''
      publish:
        type: boolean
        description: Whether to publish the package to Pypi
        required: false
        default: false
  workflow_call:
    inputs:
      runs-on:
        description: "The OS to run the job on"
        required: false
        default: "ubuntu-22.04"
        type: string
      version:
        type: string
        required: false
        description: The string to extract semver labels from.
        default: ''
      publish:
        type: boolean
        description: Whether to publish the package to Pypi
        required: false
        default: false

jobs:
  publish_to_pypi:
    name: Publish Infrahub MCP to PyPI
    runs-on: ${{ inputs.runs-on || 'ubuntu-22.04' }}
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install deps (locked)
        run: uv sync --all-extras --frozen

      - name: Build dists
        run: uv build

      - name: Show artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        if: ${{ inputs.publish == true }}
        run: uv publish --token "${{ secrets.PYPI_TOKEN }}"

  publish_container_image:
    name: Publish multi-arch container image
    runs-on: ${{ inputs.runs-on || 'ubuntu-22.04' }}
    needs: publish_to_pypi
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.opsmill.io
        if: ${{ inputs.publish == true }}
        uses: docker/login-action@v3
        with:
          registry: registry.opsmill.io
          username: ${{ secrets.OPSMILL_REGISTRY_USERNAME }}
          password: ${{ secrets.OPSMILL_REGISTRY_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.publish == true }}
          tags: |
            registry.opsmill.io/opsmill/infrahub-mcp-server:${{ inputs.version || 'dev' }}
            registry.opsmill.io/opsmill/infrahub-mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
