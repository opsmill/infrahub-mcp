---
# yamllint disable rule:truthy rule:line-length
name: Build And Push Docker image

# When calling this workflow, ensure you use
#   secrets: inherit

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: Whether to publish the image to the Infrahub private registry
        required: false
        default: false
      version:
        type: string
        required: false
        description: The string to extract semver labels from.
        default: ''
      ref:
        type: string
        required: true
        description: The GIT ref from which the image will be built
      tags:
        type: string
        required: true
        description: The tags for the docker image
      labels:
        type: string
        required: true
        description: The labels for the docker image
      platforms:
        type: string
        required: false
        description: Comma separated platform list to build the image for
        default: "linux/amd64,linux/arm64"
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Whether to publish the image to the Infrahub private registry
        required: false
        default: false
      version:
        type: string
        required: false
        description: The string to extract semver labels from.
        default: ''
      ref:
        type: string
        required: true
        description: The GIT ref from which the image will be built
      tags:
        type: string
        required: true
        description: The tags for the docker image
      labels:
        type: string
        required: true
        description: The labels for the docker image
      platforms:
        type: string
        required: false
        description: Comma separated platform list to build the image for
        default: "linux/amd64,linux/arm64"

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref }}
  cancel-in-progress: true

env:
  DOCKERFILE: "development/Dockerfile"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check if platform is requested
        id: check
        run: |
          if [[ "${{ inputs.platforms }}" != *"${{ matrix.platform }}"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        if: steps.check.outputs.skip == 'false' && inputs.publish
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push by digest
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          provenance: false  # avoids cross-platform "unknown" entries
          push: ${{ inputs.publish }}
          platforms: ${{ matrix.platform }}
          labels: ${{ inputs.labels }}
          outputs: ${{ inputs.publish && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', vars.HARBOR_HOST, github.repository) || '' }}

      - name: Export digest
        if: steps.check.outputs.skip == 'false' && inputs.publish
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.check.outputs.skip == 'false' && inputs.publish
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          SOURCES=$(printf '${{ vars.HARBOR_HOST }}/${{ github.repository }}@sha256:%s ' *)
          TAGS=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            TAGS="$TAGS --tag $tag"
          done <<< "${{ inputs.tags }}"
          docker buildx imagetools create $TAGS $SOURCES

      - name: Inspect manifest
        id: inspect
        run: |
          FIRST_TAG=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            FIRST_TAG="$tag"
            break
          done <<< "${{ inputs.tags }}"
          digest=$(docker buildx imagetools inspect "$FIRST_TAG" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  sign:
    needs: merge
    if: inputs.publish
    runs-on: ubuntu-24.04
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign manifest
        run: |
          cosign sign --yes --recursive --new-bundle-format=false --use-signing-config=false \
            "${{ vars.HARBOR_HOST }}/${{ github.repository }}@${{ needs.merge.outputs.digest }}"

  sbom:
    needs: merge
    if: inputs.publish
    runs-on: ubuntu-24.04
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate SBOM (SPDX)
        run: |
          syft \
            "${{ vars.HARBOR_HOST }}/${{ github.repository }}@${{ needs.merge.outputs.digest }}" \
            --output spdx-json=infrahub-mcp-sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft \
            "${{ vars.HARBOR_HOST }}/${{ github.repository }}@${{ needs.merge.outputs.digest }}" \
            --output cyclonedx-json=infrahub-mcp-sbom.cdx.json

      - name: Attest SBOM (SPDX)
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate infrahub-mcp-sbom.spdx.json \
            "${{ vars.HARBOR_HOST }}/${{ github.repository }}@${{ needs.merge.outputs.digest }}"

      - name: Attest SBOM (CycloneDX)
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate infrahub-mcp-sbom.cdx.json \
            "${{ vars.HARBOR_HOST }}/${{ github.repository }}@${{ needs.merge.outputs.digest }}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ inputs.version }}
          path: |
            infrahub-mcp-sbom.spdx.json
            infrahub-mcp-sbom.cdx.json
          retention-days: 90
