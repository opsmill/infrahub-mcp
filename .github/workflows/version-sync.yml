---
# yamllint disable rule:truthy
name: Version sync

on:
  workflow_run:
    workflows: ["Auto bump version"]
    types: [completed]
    branches: [stable]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-versions:
    # Only run after auto-bump succeeds (or when manually dispatched).
    # Acts as a safety net for direct pyproject.toml edits that bypass auto-bump.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: stable
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install mcp-discovery
        # yamllint disable rule:line-length
        env:
          MCP_DISCOVERY_VERSION: "0.2.5"
          MCP_DISCOVERY_SHA256: "ede19b0e8a6d960ddb3cf0abd7d33e791ad94aecfe65d94c33c6011bd5291ba9"
        run: |
          # Extract to a tmp dir so stray bundled files (LICENSE, README,
          # etc.) never land in the working tree.
          TMPDIR=$(mktemp -d)
          curl -sL "https://github.com/rust-mcp-stack/mcp-discovery/releases/download/v${MCP_DISCOVERY_VERSION}/mcp-discovery-x86_64-unknown-linux-gnu.tar.xz" \
            -o "${TMPDIR}/mcp-discovery.tar.xz"
          echo "${MCP_DISCOVERY_SHA256}  ${TMPDIR}/mcp-discovery.tar.xz" | sha256sum -c
          tar -xJf "${TMPDIR}/mcp-discovery.tar.xz" -C "${TMPDIR}" --strip-components=1
          sudo mv "${TMPDIR}/mcp-discovery" /usr/local/bin/
          rm -rf "${TMPDIR}"
        # yamllint enable rule:line-length

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: bash scripts/sync-versions.sh "${{ steps.version.outputs.version }}"

      - name: Regenerate CAPABILITIES.md
        run: bash scripts/update-capabilities.sh

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json CAPABILITIES.md pyproject.toml
          if git diff --staged --quiet; then
            echo "All versions already in sync"
            exit 0
          fi
          git commit -m "chore: sync version to ${{ steps.version.outputs.version }}"
          git push
