---
# yamllint disable rule:truthy rule:line-length
name: MCP Discovery

on:
  workflow_call:
  pull_request:
    paths:
      - "src/infrahub_mcp/**"
      - "CAPABILITIES.md"

permissions:
  contents: read

jobs:
  validate-capabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Generate CAPABILITIES.md
        uses: rust-mcp-stack/mcp-discovery-action@v1
        with:
          command: create
          mcp-launch-command: >-
            env INFRAHUB_ADDRESS=http://localhost:8080 INFRAHUB_API_TOKEN=dummy
            uv run fastmcp run src/infrahub_mcp/server.py:mcp
          filename: ${{ github.workspace }}/capabilities-check.md
          template: md

      - name: Validate CAPABILITIES.md is up to date
        run: |
          if ! diff -q CAPABILITIES.md ${{ github.workspace }}/capabilities-check.md > /dev/null 2>&1; then
            echo "::error::CAPABILITIES.md is out of date. Run 'bash scripts/update-capabilities.sh' and commit."
            diff CAPABILITIES.md ${{ github.workspace }}/capabilities-check.md || true
            exit 1
          fi
