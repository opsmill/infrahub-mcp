---
# yamllint disable rule:truthy
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  MCP_DISCOVERY_VERSION: "0.2.5"
  MCP_DISCOVERY_SHA256: "ede19b0e8a6d960ddb3cf0abd7d33e791ad94aecfe65d94c33c6011bd5291ba9"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate pyproject.toml version matches tag
        run: |
          PYPROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VERSION, tag=v$TAG_VERSION"
            exit 1
          fi

      - name: Validate server.json versions match tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          TOP_VERSION=$(jq -r .version server.json)
          PKG_VERSION=$(jq -r '.packages[0].version' server.json)
          if [ "$TOP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: server.json .version=$TOP_VERSION, tag=v$TAG_VERSION"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: server.json .packages[0].version=$PKG_VERSION, tag=v$TAG_VERSION"
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install mcp-discovery
        env:
          TARBALL: "mcp-discovery-x86_64-unknown-linux-gnu.tar.xz"
          BASE_URL: "https://github.com/rust-mcp-stack/mcp-discovery/releases/download"
        run: |
          curl -sL "${BASE_URL}/v${MCP_DISCOVERY_VERSION}/${TARBALL}" -o mcp-discovery.tar.xz
          echo "${MCP_DISCOVERY_SHA256}  mcp-discovery.tar.xz" | sha256sum --check -
          tar -xJf mcp-discovery.tar.xz --strip-components=1
          sudo mv mcp-discovery /usr/local/bin/

      - name: Validate CAPABILITIES.md is up to date
        run: "uv run invoke check-capabilities"

  publish:
    needs: validate
    uses: ./.github/workflows/workflow-publish.yml
    secrets: inherit
    with:
      publish: true
      version: ${{ github.ref_name }}
