---
# yamllint disable rule:truthy
name: Auto bump version

on:
  push:
    branches: [stable]

concurrency:
  group: auto-bump
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Guard: skip bot commits to prevent infinite loops
  # ---------------------------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check commit author and message
        id: check
        env:
          MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.username }}
        run: |
          if [[ "$MSG" == chore\(release\):* ]] || [[ "$MSG" == "chore: sync version"* ]]; then
            echo "Skipping: bot commit message detected"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          elif [[ "$AUTHOR" == "opsmill-bot" ]]; then
            echo "Skipping: opsmill-bot author detected"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Bump: calculate next version, update files, commit
  #
  # Tag creation is deferred to release publication. When a maintainer
  # publishes the draft maintained by release-drafter, GitHub creates the
  # tag against the release's targetCommitish (stable HEAD at that moment),
  # guaranteeing the tag includes every PR merged up to publish time.
  # ---------------------------------------------------------------------------
  bump:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.next-version }}
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_INFRAHUB_BOT_TOKEN }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install mcp-discovery
        # yamllint disable rule:line-length
        env:
          MCP_DISCOVERY_VERSION: "0.2.5"
          MCP_DISCOVERY_SHA256: "ede19b0e8a6d960ddb3cf0abd7d33e791ad94aecfe65d94c33c6011bd5291ba9"
        run: |
          # Extract to a tmp dir so stray bundled files (LICENSE, README,
          # etc.) never land in the working tree and get picked up by
          # `git add -A` in the bump commit.
          TMPDIR=$(mktemp -d)
          curl -sL "https://github.com/rust-mcp-stack/mcp-discovery/releases/download/v${MCP_DISCOVERY_VERSION}/mcp-discovery-x86_64-unknown-linux-gnu.tar.xz" \
            -o "${TMPDIR}/mcp-discovery.tar.xz"
          echo "${MCP_DISCOVERY_SHA256}  ${TMPDIR}/mcp-discovery.tar.xz" | sha256sum -c
          tar -xJf "${TMPDIR}/mcp-discovery.tar.xz" -C "${TMPDIR}" --strip-components=1
          sudo mv "${TMPDIR}/mcp-discovery" /usr/local/bin/
          rm -rf "${TMPDIR}"
        # yamllint enable rule:line-length

      - name: Calculate next version from PR labels
        uses: patrickjahns/version-drafter-action@v1.3.1
        id: next
        env:
          GITHUB_TOKEN: ${{ secrets.GH_INFRAHUB_BOT_TOKEN }}

      - name: Compare with current version
        id: compare
        run: |
          CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          NEXT="${{ steps.next.outputs.next-version }}"
          echo "Current: $CURRENT"
          echo "Next:    $NEXT"

          if [ "$CURRENT" = "$NEXT" ]; then
            echo "No version change needed"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bump: $CURRENT -> $NEXT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync versions to all files
        if: steps.compare.outputs.changed == 'true'
        run: bash scripts/sync-versions.sh "${{ steps.next.outputs.next-version }}"

      - name: Regenerate CAPABILITIES.md
        if: steps.compare.outputs.changed == 'true'
        run: bash scripts/update-capabilities.sh

      - name: Commit version bump
        if: steps.compare.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.next.outputs.next-version }}"
          git config user.name "opsmill-bot"
          git config user.email "opsmill-bot@users.noreply.github.com"
          # Stage only the files version-sync + capabilities regen are
          # allowed to touch. Avoids picking up stray files dropped by
          # third-party tools (e.g. mcp-discovery tarball contents).
          git add pyproject.toml server.json uv.lock CAPABILITIES.md
          git commit -m "chore(release): bump to v${VERSION}"
          git push origin stable

  # ---------------------------------------------------------------------------
  # Release draft: create/update a draft GitHub release.
  # The draft's tag (`v${VERSION}`) is materialized by GitHub only when the
  # maintainer publishes the draft — guaranteeing the tag points at HEAD at
  # publish time, with every subsequent PR included.
  # ---------------------------------------------------------------------------
  release-draft:
    needs: bump
    if: always() && needs.bump.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          tag: "v${{ needs.bump.outputs.version }}"
          version: "${{ needs.bump.outputs.version }}"
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_INFRAHUB_BOT_TOKEN }}
