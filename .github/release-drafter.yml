---
# Configuration for release-drafter/release-drafter.
# Generates categorized release notes from merged PRs.

name-template: "Version $RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

# Release-drafter places a PR in the FIRST category whose labels match
# (top-to-bottom). Order = priority. Keep "Other Changes" last as a
# catch-all so unlabeled PRs are still listed instead of disappearing.

categories:
  - title: "Breaking Changes"
    labels:
      - "changes/major"
      - "type/breaking-change"

  - title: "Features"
    labels:
      - "type/feature"
      - "changes/minor"

  - title: "Improvements"
    labels:
      - "type/refactoring"
      - "type/housekeeping"
      - "type/tech-debt"

  - title: "Bug Fixes"
    labels:
      - "type/bug"
      - "changes/patch"

  - title: "Documentation"
    labels:
      - "type/documentation"

  - title: "Other Changes"
    labels:
      - "*"

exclude-labels:
  - "ci/skip-changelog"
  - "type/duplicate"

autolabeler:
  - label: "type/documentation"
    files:
      - "docs/**"
    branch:
      - '/docs?\/.+/'

  - label: "group/ci"
    files:
      - ".github/**"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
no-changes-template: "- No changes"
