schema_version: "1.0"

extension:
  id: "auto"
  name: "Spec Auto"
  version: "1.0.0"
  description: "Run the full speckit workflow end-to-end — specify, plan, critique, tasks, implement, review, extract — making all decisions autonomously."
  author: "OpsMill"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.critique.run"
    - "speckit.tasks"
    - "speckit.implement"
    - "speckit.review"
    - "speckit.extract.run"
    - "speckit.checkpoint.commit"

provides:
  commands:
    - name: "speckit.auto.run"
      file: "commands/run.md"
      description: "Run the full speckit pipeline end-to-end with autonomous decision-making"

tags:
  - "automation"
  - "workflow"
  - "pipeline"
